# Hexo Configuration

# Site
title: Marathon Archive
subtitle: 'Lore Terminal'
description: 'Marathon lore archive and project hub'
keywords:
author: Marathon Archive
language:
  - zh-CN
  - en
timezone: Asia/Shanghai

# URL
url: https://marathon.uesc.top
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:
  - index.html
  - about/index.html
  - factions/**/*.json
  - factions/README.md
  - marathon-lore/assets/**/*.json
  - marathon-lore/content/**

# Writing
new_post_name: :title.md
default_layout: page
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page
index_generator:
  path: marathon-index-disabled
  per_page: 0
  order_by: -date

# Category & Tag
default_category: marathon
category_map:
tag_map:

# Metadata elements
meta_generator: true

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

# Pagination
per_page: 0
pagination_dir: page

# Include / Exclude
include:
exclude:
ignore:

# Theme
theme: next

sitemap:
  path: sitemap.xml
