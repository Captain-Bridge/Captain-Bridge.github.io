---
title: 阵营
layout: false
---
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>阵营 - 《失落星船：马拉松》中文站</title>
  <meta name="description" content="陣營">
  <link rel="icon" href="/marathon-lore/assets/images/icons/marathon-icon.jpg">
  <style>
    :root {
      --bg: #07090d;
      --panel: rgba(12, 14, 20, 0.92);
      --line: rgba(255,255,255,0.12);
      --text: rgba(245,247,250,0.95);
      --soft: rgba(214,223,236,0.72);
      --dim: rgba(214,223,236,0.42);
      --green: #00e55b;
      --ui-scale: 1;
      --node-surface-fill: linear-gradient(180deg, rgba(255,255,255,.02), rgba(0,0,0,.06)), rgb(50, 51, 59);
      --node-surface-noise: repeating-linear-gradient(0deg, rgba(255,255,255,.028) 0 1px, transparent 1px 3px), repeating-linear-gradient(90deg, rgba(255,255,255,.016) 0 1px, transparent 1px 4px), repeating-linear-gradient(135deg, rgba(255,255,255,.012) 0 1px, transparent 1px 5px), repeating-linear-gradient(45deg, rgba(0,0,0,.05) 0 1px, transparent 1px 6px);
      --shadow: 0 24px 80px rgba(0,0,0,0.45);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      background:
        radial-gradient(circle at top, rgba(42,57,92,.18), transparent 34%),
        linear-gradient(180deg, rgba(13,15,22,.92), rgba(8,9,13,.98)),
        var(--bg);
      color: var(--text);
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    body {
      overflow: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      background: repeating-linear-gradient(to bottom, rgba(255,255,255,.018), rgba(255,255,255,.018) 1px, transparent 1px, transparent 3px);
      opacity: .24;
      z-index: 10;
    }

    body::after {
      background-image:
        radial-gradient(rgba(255,255,255,.06) .6px, transparent .6px),
        radial-gradient(rgba(255,255,255,.03) .6px, transparent .6px);
      background-position: 0 0, 24px 24px;
      background-size: 32px 32px;
      opacity: .08;
      z-index: 9;
    }

    .page {
      position: relative;
      z-index: 2;
      height: 100vh;
      display: grid;
      grid-template-rows: minmax(0, 1fr) 58px;
      gap: 0;
      padding: 0 24px;
      zoom: var(--ui-scale);
    }

    @media (min-width: 2200px) and (min-height: 1300px) {
      :root {
        --ui-scale: 1.12;
      }
    }

    .hud-top {
      display: none;
    }

    .viewport {
      min-height: 0;
      overflow: hidden;
      padding: 18px 0 10px;
      background: transparent;
      border: 0;
      box-shadow: none;
    }

    .force-view {
      height: 100%;
      min-height: 0;
    }

    .force-screen {
      height: 100%;
      min-height: 0;
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      gap: 36px;
      align-items: stretch;
    }

    .force-sidebar {
      min-height: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 22px;
      padding: 58px 0 28px;
    }

    .force-sidebar-block {
      position: relative;
      border: 1px solid rgba(255,255,255,.06);
      background: rgba(10,12,18,.58);
      overflow: hidden;
    }

    .force-sidebar-logo {
      display: block;
      background: rgba(10,12,18,.58);
      position: relative;
      margin-top: -18%;
      margin-bottom: 18%;
    }

    .force-sidebar-logo-mark {
      width: 100%;
      height: auto;
      display: block;
      padding: 0;
    }

    .force-sidebar-logo-mark img,
    .force-sidebar-logo-mark svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .force-sidebar-card {
      min-height: 0;
      display: grid;
      grid-template-rows: 48px auto;
      background: rgba(6,8,12,.62);
    }

    .force-sidebar-card-head {
      display: flex;
      align-items: center;
      padding: 0 18px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: .04em;
      color: #04120a;
      background: linear-gradient(180deg, var(--agent-accent, rgba(0,255,110,.96)), var(--agent-accent, rgba(0,230,101,.9)));
    }

    .force-sidebar-card-body {
      position: relative;
      overflow: hidden;
      aspect-ratio: 310 / 250;
      background: rgba(8,10,18,.92);
    }

    .force-sidebar-card-body::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, transparent 0 14%, rgba(255,255,255,.04) 14% 16%, transparent 16% 80%, rgba(255,255,255,.04) 80% 82%, transparent 82%),
        repeating-linear-gradient(0deg, rgba(255,255,255,.025) 0 1px, transparent 1px 4px);
      opacity: .45;
    }

    .force-sidebar-card-media {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .force-sidebar-card-media img,
    .force-sidebar-card-media svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .force-workspace {
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 18px;
    }

    .force-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: start;
      gap: 18px;
      padding-top: 2px;
    }

    .force-head-copy {
      display: grid;
      gap: 8px;
      align-content: start;
      color: var(--dim);
      font-size: 12px;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .force-head-copy strong {
      color: rgba(255,255,255,.3);
      font-weight: 600;
    }

    .force-head-copy span {
      color: rgba(255,255,255,.16);
      max-width: 720px;
      line-height: 1.45;
    }

    .force-faction-rail {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 12px;
    }

    .force-faction-button {
      min-width: 92px;
      min-height: 38px;
      padding: 0 16px;
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 4px;
      background: rgba(255,255,255,.06);
      color: rgba(214,223,236,.7);
      font: inherit;
      font-weight: 700;
      letter-spacing: .04em;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
    }

    .force-faction-button.active {
      background: rgba(242,242,247,.96);
      color: #10131a;
    }

    .force-faction-button-visual {
      display: none;
    }

    .force-faction-button-copy {
      min-width: 0;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .force-faction-button-copy strong {
      display: block;
      font-size: 16px;
      line-height: 1;
      white-space: nowrap;
    }

    .force-faction-button-copy span {
      display: none;
    }

    .force-shell {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 410px;
      gap: 24px;
      overflow: hidden;
    }

    .force-map-panel,
    .force-detail-panel {
      min-height: 0;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(9,11,15,.72);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .force-map-panel {
      padding: 18px 18px 14px;
    }

    .force-map-scroller {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      padding-right: 0;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,.22) transparent;
    }

    .force-map-scroller::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    .force-map-scroller::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,.22);
    }

    .force-map-canvas {
      position: relative;
      width: var(--canvas-width, 1360px);
      height: var(--canvas-height, 920px);
      border: 1px solid rgba(255,255,255,.08);
      background:
        linear-gradient(180deg, rgba(255,255,255,.015), rgba(255,255,255,0)),
        rgba(11,13,19,.98);
      transform-origin: top left;
      will-change: transform;
    }

    .force-map-canvas::before {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(to bottom, rgba(255,255,255,.018), rgba(255,255,255,.018) 1px, transparent 1px, transparent 3px);
      opacity: .25;
      pointer-events: none;
    }

    .force-map-fit {
      width: 100%;
      height: 100%;
      min-height: 0;
      overflow: hidden;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
    }

    .force-map-scale {
      position: relative;
      flex: 0 0 auto;
    }

    .force-map-caption {
      position: absolute;
      z-index: 1;
      display: grid;
      gap: 2px;
      color: rgba(255,255,255,.18);
      font-size: 11px;
      letter-spacing: .08em;
      text-transform: uppercase;
      pointer-events: none;
    }

    .force-map-caption.left {
      left: 26px;
      top: 14px;
    }

    .force-map-caption.right {
      right: 24px;
      top: 16px;
      justify-items: end;
    }

    .force-map-caption strong {
      font-size: 12px;
      color: rgba(255,255,255,.22);
      font-weight: 700;
      letter-spacing: .06em;
    }

    .force-decorator {
      position: absolute;
      pointer-events: none;
      z-index: 1;
    }

    .force-decorator.line-h {
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.12), transparent);
    }

    .force-decorator.link-h,
    .force-decorator.link-v {
      border-radius: 18px;
      background: var(--node-bg, rgb(50, 51, 59));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.05),
        inset 0 -1px 0 rgba(0,0,0,.38),
        0 12px 22px rgba(0,0,0,.22);
      opacity: .98;
      z-index: 2;
      overflow: visible;
      filter: saturate(1.05);
    }

    .force-decorator.link-h {
      min-height: 64px;
    }

    .force-decorator.link-v {
      min-width: 64px;
    }

    .force-decorator.link-h::before,
    .force-decorator.link-v::before {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: inherit;
      background: var(--node-surface-fill), var(--node-surface-noise);
      opacity: .4;
      pointer-events: none;
      z-index: 0;
    }

    .force-decorator.link-h::after,
    .force-decorator.link-v::after {
      content: none;
    }

    .force-decorator.spark {
      border-top: 2px solid rgba(125,72,133,.56);
      border-bottom: 2px solid rgba(81,170,181,.45);
      border-left: 1px solid rgba(125,72,133,.2);
      border-right: 1px solid rgba(81,170,181,.2);
      opacity: .7;
    }

    .force-decorator.spark::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 16px;
      height: 16px;
      transform: translate(-50%, -50%) rotate(45deg);
      background: radial-gradient(circle, rgba(115,67,170,.85) 0 35%, rgba(115,67,170,.15) 55%, transparent 72%);
    }

    .force-node {
      --node-accent: var(--green);
      --node-bg: rgb(50, 51, 59);
      --node-border: rgba(255,255,255,.08);
      --node-frame-color: rgba(255,255,255,.08);
      --node-text: #99a0b3;
      --node-icon: currentColor;
      --node-icon-active: var(--node-accent);
      --node-icon-locked: #303542;
      --node-bar-active-bg: var(--node-accent);
      --node-bar-active-border: #000;
      position: absolute;
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--node-gap, 18px);
      border: var(--node-border-width, 1px) solid var(--node-border);
      background: var(--node-bg);
      box-shadow: inset 0 0 0 1px rgba(14,16,23,.88), inset 0 0 0 2px rgba(255,255,255,.035);
      border-radius: var(--node-radius, 12px);
      color: var(--node-text);
      cursor: pointer;
      padding: var(--node-padding, 10px);
      overflow: visible;
      transform: scale(1.1);
      transform-origin: center center;
    }

    .force-node::before {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: calc(var(--node-radius, 12px) - 1px);
      background: var(--node-surface-fill), var(--node-surface-noise);
      opacity: .4;
      pointer-events: none;
      z-index: 0;
    }

    .force-node.active-node::before {
      opacity: .22;
    }

    .force-node.active-node {
      background: var(--node-accent, var(--node-bg));
    }

    .force-node.has-vip-surface:not(.active-node) {
      --node-bg: #dfe5e8;
      --node-border: rgba(18,22,30,.34);
      --node-frame-color: rgba(18,22,30,.34);
      --node-text: #1a1f29;
      --node-icon: #11151b;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.72),
        inset 0 0 0 2px rgba(0,0,0,.08);
    }

    .force-node.has-vip-surface:not(.active-node)::before {
      background:
        linear-gradient(180deg, rgba(255,255,255,.16), rgba(255,255,255,.04)),
        url("/factions/data/VIP_node.webp");
      background-size: 100% 100%, cover;
      background-position: center;
      opacity: .96;
    }

    .force-node.is-active .force-node-icon,
    .force-node.active-node .force-node-icon {
      color: var(--node-icon-active);
    }

    .force-node.active-node .force-node-icon .is-svg {
      color: #000;
    }

    .force-node.has-vip-surface .force-node-icon .is-svg {
      color: #000;
    }

    .force-node.is-muted {
      color: #676d7f;
    }

    .force-node.is-locked .force-node-icon {
      color: var(--node-icon-locked);
    }

    .force-node-frame {
      position: absolute;
      border: var(--node-frame-border-width, 1.5px) solid var(--node-frame-color);
      border-radius: calc(var(--node-radius, 12px) + 1px);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.18);
      pointer-events: none;
      z-index: 1;
    }

    .force-node-badge {
      position: absolute;
      left: var(--node-badge-left, 10px);
      top: var(--node-badge-top, 10px);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: var(--node-badge-min-width, 22px);
      height: var(--node-badge-height, 22px);
      padding: 0 var(--node-badge-padding-x, 6px);
      border: 1px solid currentColor;
      font-size: var(--node-badge-font-size, 12px);
      line-height: 1;
      color: #d8dae3;
      z-index: 4;
    }

    .force-node-icon,
    .force-node-icon img,
    .force-node-icon svg {
      width: var(--node-icon-size, 34px);
      height: var(--node-icon-size, 34px);
    }

    .force-node-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--node-icon);
      flex: 0 0 auto;
      position: relative;
      z-index: 4;
    }

    .force-node-icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .force-node-icon .is-svg {
      width: 100%;
      height: 100%;
      display: inline-block;
      background-color: currentColor;
      -webkit-mask-repeat: no-repeat;
      -webkit-mask-position: center;
      -webkit-mask-size: 130%;
      mask-repeat: no-repeat;
      mask-position: center;
      mask-size: 130%;
    }

    .force-node-icon-text {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: var(--node-icon-font-size, 30px);
      line-height: 1;
      font-weight: 700;
    }

    .force-node-bars {
      position: absolute;
      left: 50%;
      bottom: var(--node-bars-bottom, 12px);
      transform: translateX(-50%);
      display: flex;
      gap: var(--node-bar-gap, 4px);
      z-index: 4;
    }

    .force-node-bar {
      width: var(--node-bar-width, 18px);
      height: var(--node-bar-height, 6px);
      border: 1.5px solid var(--node-bar-active-border);
      background: var(--node-bar-active-bg);
      border-radius: 999px;
      box-shadow: 0 0 0 1px rgba(0,0,0,.85);
    }

    .force-node-bar.is-active {
      background: var(--node-bar-active-bg);
      border-color: var(--node-bar-active-border);
    }

    .force-node.active-node .force-node-bar {
      background:
        linear-gradient(180deg, rgba(255,255,255,.04), rgba(0,0,0,.08)),
        var(--node-surface-noise),
        rgb(210, 212, 213);
      border-color: rgb(210, 212, 213);
    }

    .force-map-footer {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-top: 18px;
    }

    .force-peak-switch {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 14px;
      padding: 0;
      flex-wrap: wrap;
    }

    .force-peak-pill {
      width: 54px;
      height: 54px;
      min-height: 54px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgb(50, 51, 59);
      color: #99a0b3;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      flex: 0 0 54px;
      box-shadow: inset 0 0 0 1px rgba(14,16,23,.88), inset 0 0 0 2px rgba(255,255,255,.035);
    }

    .force-peak-pill-media {
      width: 100%;
      height: 100%;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .force-peak-pill-media img,
    .force-peak-pill-media svg {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .force-peak-pill span {
      font-size: 18px;
    }

    .force-peak-pill.active {
      background: var(--peak-accent, var(--green));
      color: #10131a;
    }

    .force-progress-copy {
      margin: 0;
      color: rgba(255,255,255,.7);
      text-align: center;
      font-size: 15px;
      letter-spacing: .08em;
    }

    .factions-esc-back {
      position: fixed;
      left: 20px;
      bottom: 18px;
      z-index: 30;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: rgba(226,232,244,.78);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: .04em;
      text-decoration: none;
      user-select: none;
    }

    .factions-esc-back::before {
      content: "Esc";
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 28px;
      height: 18px;
      padding: 0 6px;
      color: rgba(226,232,244,.82);
      font-size: 12px;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .force-detail-panel {
      padding: 22px 24px 18px;
      justify-content: flex-start;
      gap: 16px;
      background: rgba(10,12,18,.7);
    }

    .force-detail-copy {
      display: grid;
      gap: 10px;
    }

    .force-detail-kicker {
      margin: 0;
      color: rgba(255,255,255,.18);
      font-size: 12px;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .force-detail-copy h2 {
      margin: 0;
      font-size: 28px;
      letter-spacing: .04em;
    }

    .force-detail-meta,
    .force-detail-description {
      margin: 0;
      color: var(--soft);
      line-height: 1.5;
      font-size: 14px;
    }

    .force-level-switch {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(54px, 1fr));
      gap: 0;
    }

    .force-level-pill {
      min-height: 36px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.07);
      color: rgba(255,255,255,.72);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      border-radius: 0;
    }

    .force-level-pill + .force-level-pill {
      margin-left: -1px;
    }

    .force-level-pill:first-child {
      border-top-left-radius: 12px;
      border-bottom-left-radius: 12px;
    }

    .force-level-pill:last-child {
      border-top-right-radius: 12px;
      border-bottom-right-radius: 12px;
    }

    .force-level-pill.active {
      background: #f1f2f5;
      color: #0f1218;
    }

    .force-detail-block {
      display: grid;
      gap: 8px;
    }

    .force-detail-block h3 {
      margin: 0;
      font-size: 16px;
    }

    .force-detail-block h3 {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
    }

    .force-detail-icon {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-start;
      gap: 8px;
      width: 100%;
    }

    .force-detail-icon img,
    .force-detail-icon svg {
      width: 80px;
      height: 80px;
      object-fit: contain;
    }

    .force-detail-unlock-name {
      display: block;
    }

    .force-stat-list {
      display: grid;
      gap: 20px;
    }

    .force-material-row {
      display: grid;
      grid-template-columns: max-content minmax(0, 1fr) auto;
      align-items: center;
      gap: 20px;
    }

    .force-material-visual {
      display: inline-flex;

    @media (max-width: 1080px) {

      }
    }

    @media (max-width: 900px) {
      .page {
        padding: 10px 12px;

      .viewport {

      .force-faction-rail {

      }

      .force-peak-switch {
        padding: 0;
        gap: 8px;
      }

      .force-faction-button {

      .force-sidebar-logo {

      .force-sidebar-card {
        grid-template-rows: 36px auto;
      }

      .force-sidebar-card-head {
        padding: 0 12px;
        font-size: 14px;
      }

      .force-sidebar-card-media {
        inset: 0;
      }

      .force-workspace {

      }

      .force-head {
        gap: 10px;
      }

      .force-detail-copy h2 {

    @media (max-width: 640px) {

<body>
  <main class="page">
    <header class="hud-top">
      <div class="hud-chip">FACTIONS</div>
      <div class="hud-copy">
        <strong>Faction Upgrade Atlas</strong>
        <span>阵营升级展示页 / 与百科平级的独立页面</span>
      </div>
      <nav class="hud-nav">
        <a class="nav-link" href="/">返回首页</a>
        <a class="nav-link" href="/marathon-lore/">进入百科</a>
      </nav>
    </header>

    <section class="viewport">
      <div id="app" class="force-view"></div>
    </section>
  </main>

  <a class="factions-esc-back" href="javascript:void(0)" data-factions-esc-back><span>返回</span></a>

  <script>
    const app = document.getElementById('app');
    const DEFAULT_PEAK_LABELS = ['I', 'II', 'III', 'IV', 'V', 'VI'];
    const GRID_ROWS = 4;
    const GRID_COLS = 6;
    const GRID_LAYOUT_DEFAULTS = {
      canvasWidth: 1360,
      canvasHeight: 920,
      paddingX: 24,
      paddingY: 24,
      connectorThickness: 0.15,
      fitToPanel: true,
      baseNodeScale: 0.9,
      slots: {
        small: { width: 0.45, height: 0.45 },
        large: { width: 0.76, height: 0.76 }
      }
    };
    const state = {
      data: null,
      factionCache: Object.create(null),
      activeFaction: null,
      factionId: null,
      nodeId: null,
      level: null,
      detailMode: 'node',
      peakIndex: 0,
      loadSeq: 0
    };

    function iconMarkup(name) {
      const icons = {
        brace: '<svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="4.5" stroke-linecap="round"><path d="M18 16h8v10H18v12h8v10h-8"/><path d="M46 16h-8v10h8v12h-8v10h8"/><path d="M28 32h8"/></svg>',
        tech: '<svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="4.5"><rect x="18" y="18" width="28" height="28" rx="4"/><path d="M8 24h10M46 24h10M8 40h10M46 40h10M24 8v10M40 8v10M24 46v10M40 46v10"/></svg>',
        cache: '<svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="4.5" stroke-linejoin="round"><path d="M14 22h36l8 8v14l-8 8H14l-8-8V30z"/><path d="M14 22l10 10h16l10-10"/><path d="M14 52l10-10h16l10 10"/></svg>',
        module: '<svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="4.5"><rect x="16" y="24" width="32" height="16" rx="4"/><path d="M10 32h6M48 32h6M24 24v16M40 24v16"/></svg>',
        signal: '<svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="4.5"><path d="M16 44h8M28 36h8M40 28h8"/><path d="M16 20h32"/></svg>',
        faction: '<svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="4.5" stroke-linejoin="round"><path d="M32 8l14 8v16l-14 8-14-8V16z"/><path d="M18 32v16l14 8 14-8V32"/></svg>'
      };

      return icons[name] || icons.module;
    }

    function getFactions() {
      return Array.isArray(state.data?.factions) ? state.data.factions : [];
    }

    function getDefaultFactionId() {
      return state.data?.defaultFactionId || getFactions()[0]?.id || null;
    }

    function getFactionCatalogItem(factionId) {
      return getFactions().find(item => item.id === factionId) || null;
    }

    function cloneValue(value) {
      return JSON.parse(JSON.stringify(value));
    }

    function mergeDeep(base, override) {
      const output = Array.isArray(base) ? [...base] : { ...(base || {}) };
      if (!override || typeof override !== 'object') return output;
      for (const [key, value] of Object.entries(override)) {
        if (value && typeof value === 'object' && !Array.isArray(value) && output[key] && typeof output[key] === 'object' && !Array.isArray(output[key])) {
          output[key] = mergeDeep(output[key], value);
        } else {
          output[key] = cloneValue(value);
        }
      }
      return output;
    }

    function createDefaultPeakButtons() {
      return DEFAULT_PEAK_LABELS.map((label, index) => ({
        id: 'peak-' + (index + 1),
        label,
        title: '巅峰升级 ' + label,
        icon: ''
      }));
    }

    function getNodeSurfacePreset(node) {
      if (typeof node?.surfacePreset === 'string' && node.surfacePreset.trim()) {
        return node.surfacePreset.trim().toLowerCase();
      }
      return null;
    }

    function getGridNodeSize(node, grid) {
      if (Number.isFinite(Number(node?.width)) && Number.isFinite(Number(node?.height))) {
        return {
          width: Number(node.width),
          height: Number(node.height)
        };
      }

      const rawSizeKey = typeof node?.size === 'string' && node.size.trim() ? node.size.trim() : 'large';
      const sizeAliasMap = {
        sm: 'small',
        md: 'small',
        lg: 'large',
        xl: 'large',
        small: 'small',
        large: 'large'
      };
      const normalizedSizeKey = sizeAliasMap[rawSizeKey] || 'large';
      const preset = grid.slots?.[normalizedSizeKey] || GRID_LAYOUT_DEFAULTS.slots.large;
      return {
        widthRatio: Number(preset.width) || GRID_LAYOUT_DEFAULTS.slots.large.width,
        heightRatio: Number(preset.height) || GRID_LAYOUT_DEFAULTS.slots.large.height,
        normalizedSizeKey
      };
    }

    function normalizeGridNode(node, index, grid) {
      if (!node || typeof node !== 'object') return null;
      if (node.empty || node.exists === false) return null;

      const row = Number.parseInt(node.row, 10);
      const col = Number.parseInt(node.col, 10);
      if (!Number.isFinite(row) || !Number.isFinite(col)) return null;
      if (row < 0 || row >= GRID_ROWS || col < 0 || col >= GRID_COLS) return null;

      const size = getGridNodeSize(node, grid);
      const usableWidth = grid.canvasWidth - (grid.paddingX * 2);
      const usableHeight = grid.canvasHeight - (grid.paddingY * 2);
      const cellWidth = usableWidth / GRID_COLS;
      const cellHeight = usableHeight / GRID_ROWS;
      const nodeWidth = Number.isFinite(Number(node?.width))
        ? Number(node.width)
        : cellWidth * clampValue(size.widthRatio * (Number(node?.scaleX) || Number(node?.scale) || Number(grid.baseNodeScale) || 1), 0.1, 1.4);
      const nodeHeight = Number.isFinite(Number(node?.height))
        ? Number(node.height)
        : cellHeight * clampValue(size.heightRatio * (Number(node?.scaleY) || Number(node?.scale) || Number(grid.baseNodeScale) || 1), 0.1, 1.4);
      const centerX = grid.paddingX + (cellWidth * col) + (cellWidth / 2);
      const centerY = grid.paddingY + (cellHeight * row) + (cellHeight / 2);
      const offsetX = Number(node.offsetX) || 0;
      const offsetY = Number(node.offsetY) || 0;

      return {
        ...cloneValue(node),
        id: node.id || ('grid-node-' + index),
        row,
        col,
        width: nodeWidth,
        height: nodeHeight,
        cellWidth,
        cellHeight,
        centerX,
        centerY,
        x: centerX - (nodeWidth / 2) + offsetX,
        y: centerY - (nodeHeight / 2) + offsetY,
        size: size.normalizedSizeKey
      };
    }

    function getGridConnectorColors(faction, link) {
      const accent = link?.color || faction?.grid?.linkColor || faction?.themecolor || 'rgba(107, 227, 255, .95)';
      const border = link?.borderColor || faction?.grid?.linkBorderColor || 'rgba(255,255,255,.24)';
      return { accent, border };
    }

    function resolveConnectorBasis(nodes, faction) {
      const connectorScale = 0.75;
      const smallNode = (Array.isArray(nodes) ? nodes : []).find(node => node?.size === 'small' && Number.isFinite(Number(node.width)) && Number.isFinite(Number(node.height))) || null;
      if (smallNode) {
        return {
          width: (Number(smallNode.width) || 0) * connectorScale,
          height: (Number(smallNode.height) || 0) * connectorScale
        };
      }

      const referenceNode = (Array.isArray(nodes) ? nodes : []).find(node => Number.isFinite(Number(node?.cellWidth)) && Number.isFinite(Number(node?.cellHeight))) || nodes?.[0] || null;
      const baseScale = Number(faction?.grid?.baseNodeScale || faction?.baseNodeScale || GRID_LAYOUT_DEFAULTS.baseNodeScale) || 1;
      const slotSmall = mergeDeep(GRID_LAYOUT_DEFAULTS.slots.small, faction?.grid?.slots?.small || {});
      const cellWidth = Number(referenceNode?.cellWidth) || 0;
      const cellHeight = Number(referenceNode?.cellHeight) || 0;

      return {
        width: Math.max(1, cellWidth * (Number(slotSmall.width) || GRID_LAYOUT_DEFAULTS.slots.small.width) * baseScale * connectorScale),
        height: Math.max(1, cellHeight * (Number(slotSmall.height) || GRID_LAYOUT_DEFAULTS.slots.small.height) * baseScale * connectorScale)
      };
    }

    function createConnector(fromNode, toNode, direction, faction, linkId, linkMeta, connectorBasis) {
      const bridgeWidth = Math.max(1, Number(connectorBasis?.width) || 0);
      const bridgeHeight = Math.max(1, Number(connectorBasis?.height) || 0);
      const thickness = direction === 'right' || direction === 'left' ? bridgeHeight : bridgeWidth;
      const colors = getGridConnectorColors(faction, linkMeta);
      const overlap = Math.max(6, thickness * 0.5);
      const background = null;

      if (direction === 'right') {
        const startX = fromNode.x + fromNode.width - overlap;
        const endX = toNode.x + overlap;
        if (endX <= startX) return null;
        const centerY = ((fromNode.y + (fromNode.height / 2)) + (toNode.y + (toNode.height / 2))) / 2;
        const y = centerY - (bridgeHeight / 2) + (Number(linkMeta?.offsetY) || 0);
        return {
          id: linkId,
          type: 'link-h',
          x: startX,
          y,
          width: endX - startX,
          height: bridgeHeight,
          background,
          accent: colors.accent,
          color: colors.accent,
          borderColor: colors.border
        };
      }

      if (direction === 'left') {
        const startX = toNode.x + toNode.width - overlap;
        const endX = fromNode.x + overlap;
        if (endX <= startX) return null;
        const centerY = ((fromNode.y + (fromNode.height / 2)) + (toNode.y + (toNode.height / 2))) / 2;
        const y = centerY - (bridgeHeight / 2) + (Number(linkMeta?.offsetY) || 0);
        return {
          id: linkId,
          type: 'link-h',
          x: startX,
          y,
          width: endX - startX,
          height: bridgeHeight,
          background,
          accent: colors.accent,
          color: colors.accent,
          borderColor: colors.border
        };
      }

      if (direction === 'down') {
        const startY = fromNode.y + fromNode.height - overlap;
        const endY = toNode.y + overlap;
        if (endY <= startY) return null;
        const centerX = ((fromNode.x + (fromNode.width / 2)) + (toNode.x + (toNode.width / 2))) / 2;
        const x = centerX - (bridgeWidth / 2) + (Number(linkMeta?.offsetX) || 0);
        return {
          id: linkId,
          type: 'link-v',
          x,
          y: startY,
          width: bridgeWidth,
          height: endY - startY,
          background,
          accent: colors.accent,
          color: colors.accent,
          borderColor: colors.border
        };
      }

      if (direction === 'up') {
        const startY = toNode.y + toNode.height - overlap;
        const endY = fromNode.y + overlap;
        if (endY <= startY) return null;
        const centerX = ((fromNode.x + (fromNode.width / 2)) + (toNode.x + (toNode.width / 2))) / 2;
        const x = centerX - (bridgeWidth / 2) + (Number(linkMeta?.offsetX) || 0);
        return {
          id: linkId,
          type: 'link-v',
          x,
          y: startY,
          width: bridgeWidth,
          height: endY - startY,
          background,
          accent: colors.accent,
          color: colors.accent,
          borderColor: colors.border
        };
      }

      return null;
    }

    function createGridDecorators(faction, nodes) {
      const nodeMap = new Map(nodes.map(node => [node.id, node]));
      const connectors = [];
      const seen = new Set();
      const connectorBasis = resolveConnectorBasis(nodes, faction);
      const directionMap = {
        right: [0, 1],
        left: [0, -1],
        down: [1, 0],
        up: [-1, 0]
      };

      nodes.forEach(node => {
        const links = node?.links;
        if (!links || typeof links !== 'object') return;

        Object.entries(directionMap).forEach(([direction, [rowDelta, colDelta]]) => {
          const linkMeta = links[direction];
          if (!linkMeta) return;

          let targetId = null;
          if (typeof linkMeta === 'string') {
            targetId = linkMeta;
          } else if (linkMeta === true) {
            const neighbor = nodes.find(item => item.row === node.row + rowDelta && item.col === node.col + colDelta);
            targetId = neighbor?.id || null;
          } else if (typeof linkMeta === 'object') {
            targetId = linkMeta.to || null;
          }

          if (!targetId) return;
          const targetNode = nodeMap.get(targetId);
          if (!targetNode) return;

          const pairKey = [node.id, targetNode.id].sort().join('::');
          const directionKey = pairKey + '::' + (direction === 'left' || direction === 'up' ? 'reverse' : 'forward');
          if (seen.has(directionKey) || seen.has(pairKey)) return;

          const connector = createConnector(node, targetNode, direction, faction, 'link-' + node.id + '-' + targetNode.id, typeof linkMeta === 'object' ? linkMeta : null, connectorBasis);
          if (!connector) return;
          connectors.push(connector);
          seen.add(pairKey);
        });
      });

      return connectors;
    }

    function buildGridLayout(faction) {
      const grid = mergeDeep(GRID_LAYOUT_DEFAULTS, faction?.grid || {});
      const sourceNodes = Array.isArray(grid?.nodes) ? grid.nodes : [];
      const nodes = sourceNodes
        .map((node, index) => normalizeGridNode(node, index, grid))
        .filter(Boolean);

      const decorators = [
        ...(Array.isArray(faction?.decorators) ? cloneValue(faction.decorators) : []),
        ...createGridDecorators({ ...faction, grid }, nodes)
      ];

      return {
        canvasWidth: Number(grid.canvasWidth) || GRID_LAYOUT_DEFAULTS.canvasWidth,
        canvasHeight: Number(grid.canvasHeight) || GRID_LAYOUT_DEFAULTS.canvasHeight,
        nodes,
        decorators,
        captions: grid.captions || null
      };
    }

    function buildTemplateLayout(faction) {
      const grid = mergeDeep(GRID_LAYOUT_DEFAULTS, {
        canvasWidth: faction?.canvasWidth || GRID_LAYOUT_DEFAULTS.canvasWidth,
        canvasHeight: faction?.canvasHeight || GRID_LAYOUT_DEFAULTS.canvasHeight,
        paddingX: Number.isFinite(Number(faction?.paddingX)) ? Number(faction.paddingX) : GRID_LAYOUT_DEFAULTS.paddingX,
        paddingY: Number.isFinite(Number(faction?.paddingY)) ? Number(faction.paddingY) : GRID_LAYOUT_DEFAULTS.paddingY,
        baseNodeScale: Number.isFinite(Number(faction?.baseNodeScale)) ? Number(faction.baseNodeScale) : GRID_LAYOUT_DEFAULTS.baseNodeScale
      });
      const sourceNodes = Array.isArray(faction?.nodes) ? faction.nodes : [];
      const nodes = sourceNodes
        .map((node, index) => normalizeGridNode(node, index, grid))
        .filter(Boolean);

      const decorators = [
        ...(Array.isArray(faction?.decorators) ? cloneValue(faction.decorators) : []),
        ...createGridDecorators({ ...faction, grid }, nodes)
      ];

      return {
        canvasWidth: Number(grid.canvasWidth) || GRID_LAYOUT_DEFAULTS.canvasWidth,
        canvasHeight: Number(grid.canvasHeight) || GRID_LAYOUT_DEFAULTS.canvasHeight,
        nodes,
        decorators,
        captions: null
      };
    }

    function getFactionLayout(faction) {
      if (Array.isArray(faction?.grid?.nodes) && faction.grid.nodes.length) {
        return buildGridLayout(faction);
      }

      if (Array.isArray(faction?.nodes) && faction.nodes.some(node => Number.isFinite(Number(node?.row)) && Number.isFinite(Number(node?.col)))) {
        return buildTemplateLayout(faction);
      }

      return {
        canvasWidth: faction?.canvasWidth || GRID_LAYOUT_DEFAULTS.canvasWidth,
        canvasHeight: faction?.canvasHeight || GRID_LAYOUT_DEFAULTS.canvasHeight,
        nodes: Array.isArray(faction?.nodes) ? faction.nodes : [],
        decorators: Array.isArray(faction?.decorators) ? faction.decorators : [],
        captions: null
      };
    }

    function normalizeFactionCatalogData(data) {
      if (!data || !Array.isArray(data.factions) || !data.factions.length) {
        return data;
      }

      return {
        ...data,
        defaultFactionId: data.defaultFactionId || data.factions[0]?.id || null,
        factions: data.factions.map(item => ({
          ...item,
          id: item.id || null,
          iconImage: item.iconImage || item.icon || null,
          themecolor: item.themecolor || null,
          switchIcon: item.switchIcon || item.iconImage || item.icon || null,
          dataPath: item.dataPath || (item.id ? '/factions/factions/' + item.id + '.json' : null)
        }))
      };
    }

    function normalizeFactionDetailData(data, catalogItem, fallbackFaction) {
      const normalized = mergeDeep(fallbackFaction || {}, data || {});
      if (catalogItem) {
        normalized.id = catalogItem.id || normalized.id;
        if (!normalized.title) normalized.title = catalogItem.title;
        if (!normalized.shortLabel) normalized.shortLabel = catalogItem.shortLabel;
        if (!normalized.icon) normalized.icon = catalogItem.icon;
        if (!normalized.iconImage) normalized.iconImage = normalized.icon || catalogItem.icon;
        if (!normalized.switchIcon) normalized.switchIcon = catalogItem.switchIcon;
        if (!normalized.themecolor) normalized.themecolor = catalogItem.themecolor || normalized.nodeTheme?.accent || null;
        if (!normalized.dataPath) normalized.dataPath = catalogItem.dataPath;
      }

      if (!normalized.iconImage && normalized.icon) {
        normalized.iconImage = normalized.icon;
      }

      if (!normalized.icon && normalized.iconImage) {
        normalized.icon = normalized.iconImage;
      }

      if (!normalized.agentIcon) {
        normalized.agentIcon = normalized.iconImage || normalized.icon || null;
      }

      if (!normalized.panelImage) {
        normalized.panelImage = normalized.image || normalized.iconImage || normalized.icon || null;
      }

      if (normalized.themecolor) {
        normalized.nodeTheme = mergeDeep(normalized.nodeTheme || {}, {
          accent: normalized.themecolor,
          barActiveBg: normalized.themecolor,
          barActiveBorder: normalized.themecolor
        });
      }

      if (!Array.isArray(normalized.nodes) || !normalized.nodes.length) {
        if (Array.isArray(fallbackFaction?.nodes) && fallbackFaction.nodes.length) {
          normalized.nodes = cloneValue(fallbackFaction.nodes);
        }
      }

      if ((!normalized.grid || !Array.isArray(normalized.grid.nodes) || !normalized.grid.nodes.length) && fallbackFaction?.grid && Array.isArray(fallbackFaction.grid.nodes) && fallbackFaction.grid.nodes.length) {
        normalized.grid = mergeDeep(fallbackFaction.grid, normalized.grid || {});
      }

      if (!Array.isArray(normalized.decorators) || !normalized.decorators.length) {
        if (Array.isArray(fallbackFaction?.decorators) && fallbackFaction.decorators.length) {
          normalized.decorators = cloneValue(fallbackFaction.decorators);
        }
      }

      if (!Array.isArray(normalized.peakButtons) || normalized.peakButtons.length !== 6) {
        if (Array.isArray(fallbackFaction?.peakButtons) && fallbackFaction.peakButtons.length === 6) {
          normalized.peakButtons = cloneValue(fallbackFaction.peakButtons);
        } else {
          normalized.peakButtons = createDefaultPeakButtons();
        }
      }

      if (!normalized.canvasWidth) {
        normalized.canvasWidth = fallbackFaction?.canvasWidth || GRID_LAYOUT_DEFAULTS.canvasWidth;
      }

      if (!normalized.canvasHeight) {
        normalized.canvasHeight = fallbackFaction?.canvasHeight || GRID_LAYOUT_DEFAULTS.canvasHeight;
      }

      delete normalized.dataPath;
      return normalized;
    }

    function getPrototypeFaction() {
      const faction = getFaction();
      if (faction && ((Array.isArray(faction.nodes) && faction.nodes.length) || (Array.isArray(faction.grid?.nodes) && faction.grid.nodes.length))) {
        return faction;
      }
      const defaultFactionId = getDefaultFactionId();
      return (defaultFactionId && state.factionCache[defaultFactionId]) || faction || null;
    }

    function getFaction() {
      if (state.activeFaction && state.activeFaction.id === state.factionId) {
        return state.activeFaction;
      }
      if (state.factionId && state.factionCache[state.factionId]) {
        return state.factionCache[state.factionId];
      }
      const defaultFactionId = getDefaultFactionId();
      if (defaultFactionId && state.factionCache[defaultFactionId]) {
        return state.factionCache[defaultFactionId];
      }
      const fallbackId = getFactions()[0]?.id || null;
      return fallbackId && state.factionCache[fallbackId] ? state.factionCache[fallbackId] : null;
    }

    function getFactionNodes(faction) {
      const prototypeFaction = getPrototypeFaction();
      const targetFaction = faction || prototypeFaction;
      const layout = getFactionLayout(targetFaction);
      if (Array.isArray(layout?.nodes) && layout.nodes.length) return layout.nodes;
      return getFactionLayout(prototypeFaction).nodes || [];
    }

    function getFactionDecorators(faction) {
      const prototypeFaction = getPrototypeFaction();
      const targetFaction = faction || prototypeFaction;
      const layout = getFactionLayout(targetFaction);
      if (Array.isArray(layout?.decorators) && layout.decorators.length) return layout.decorators;
      return getFactionLayout(prototypeFaction).decorators || [];
    }

    function getPeakButtons(faction) {
      if (Array.isArray(faction?.peakButtons) && faction.peakButtons.length) return faction.peakButtons;
      const prototypeFaction = getPrototypeFaction();
      if (Array.isArray(prototypeFaction?.peakButtons) && prototypeFaction.peakButtons.length) {
        return prototypeFaction.peakButtons;
      }
      return createDefaultPeakButtons();
    }

    function getPeakNodes(faction) {
      if (Array.isArray(faction?.peakNodes) && faction.peakNodes.length) return faction.peakNodes;
      const prototypeFaction = getPrototypeFaction();
      if (Array.isArray(prototypeFaction?.peakNodes) && prototypeFaction.peakNodes.length) {
        return prototypeFaction.peakNodes;
      }
      return [];
    }

    function getPeakNode(faction) {
      const peakNodes = getPeakNodes(faction);
      if (!peakNodes.length) return null;
      return peakNodes[clampPeakIndex(faction, state.peakIndex)] || peakNodes[0] || null;
    }

    function getNode(faction) {
      const nodes = getFactionNodes(faction);
      return nodes.find(item => item.id === state.nodeId) || nodes[0] || null;
    }

    function clampPeakIndex(faction, peakIndex) {
      const total = getPeakButtons(faction).length || 1;
      const parsed = Number.parseInt(peakIndex, 10);
      if (!Number.isFinite(parsed) || parsed < 0) return 0;
      return Math.min(total - 1, parsed);
    }

    function clampLevel(node, level) {
      const total = Array.isArray(node?.levels) && node.levels.length ? node.levels.length : 1;
      const fallback = Number.parseInt(node?.defaultLevel, 10);
      const defaultLevel = Number.isFinite(fallback) && fallback >= 1 ? fallback : 1;
      const parsed = Number.parseInt(level, 10);
      if (!Number.isFinite(parsed) || parsed < 1) return Math.min(total, defaultLevel);
      return Math.min(total, parsed);
    }

    function getLevelData(node) {
      if (!node) return null;
      if (!Array.isArray(node.levels) || !node.levels.length) {
        return { level: 1, describe: '', summary: '', unlockName: '', unlockNums: '', unlockIcon: '', materials: [], effects: [] };
      }
      const level = clampLevel(node, state.level);
      const levelData = { ...node.levels[level - 1], level };
      if (typeof levelData.unlockIcon === 'string' && levelData.unlockIcon.trim()) {
        levelData.unlockIcon = [levelData.unlockIcon.trim()];
      } else if (!Array.isArray(levelData.unlockIcon)) {
        levelData.unlockIcon = [];
      }
      return levelData;
    }

    function getNodeLevelCount(node) {
      return clampValue(Array.isArray(node?.levels) && node.levels.length ? node.levels.length : 1, 1, 5);
    }

    function getNodeFrameCount(node) {
      return Math.max(0, getNodeLevelCount(node) - 1);
    }

    function getNodeConnectionSides(node) {
      const links = node?.links;
      if (!links || typeof links !== 'object') return {};
      return {
        left: Boolean(links.left),
        right: Boolean(links.right),
        up: Boolean(links.up),
        down: Boolean(links.down)
      };
    }

    function renderNodeFrames(node) {
      return '';
    }

    function renderBars(node) {
      const total = getNodeLevelCount(node);
      return '<div class="force-node-bars">' + Array.from({ length: total }, () => (
        '<span class="force-node-bar is-active"></span>'
      )).join('') + '</div>';
    }

    function renderDecorator(item) {
      const cls = item.type || 'line-h';
      const styleParts = [
        'left:' + item.x + 'px',
        'top:' + item.y + 'px',
        'width:' + item.width + 'px',
        'height:' + item.height + 'px'
      ];
      if (item.background) {
        if (cls === 'link-h' || cls === 'link-v') {
          styleParts.push('--node-bg:' + item.background);
        } else {
          styleParts.push('--node-surface-fill:' + item.background);
        }
      }
      if (item.accent) styleParts.push('--link-accent:' + item.accent);
      if (item.borderColor) styleParts.push('--link-border:' + item.borderColor);
      if (cls === 'link-h' || cls === 'link-v') {
        const baseBg = getComputedStyle(document.documentElement).getPropertyValue('--node-bg').trim();
        const baseNoise = getComputedStyle(document.documentElement).getPropertyValue('--node-surface-noise').trim();
        const baseFill = getComputedStyle(document.documentElement).getPropertyValue('--node-surface-fill').trim();
        if (baseBg) styleParts.push('--node-bg:' + baseBg);
        if (baseNoise) styleParts.push('--node-surface-noise:' + baseNoise);
        if (baseFill) styleParts.push('--node-surface-fill:' + baseFill);
      }
      return '<div class="force-decorator ' + cls + '" data-layout-kind="decorator" data-base-x="' + item.x + '" data-base-width="' + item.width + '" style="' + styleParts.join(';') + ';"></div>';
    }

    function clampValue(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function remapHorizontalEdge(x, baseWidth, targetWidth, padding) {
      if (targetWidth >= baseWidth) return x;
      const originStart = padding;
      const originEnd = baseWidth - padding;
      const targetEnd = targetWidth - padding;
      if (originEnd <= originStart || targetEnd <= originStart) {
        return clampValue(x, padding, targetEnd);
      }
      const ratio = clampValue((x - originStart) / (originEnd - originStart), 0, 1);
      return originStart + (targetEnd - originStart) * ratio;
    }

    function remapHorizontalPosition(x, width, baseWidth, targetWidth, padding) {
      if (targetWidth >= baseWidth) return x;
      const originStart = padding;
      const originEnd = baseWidth - padding - width;
      const targetEnd = targetWidth - padding - width;
      if (originEnd <= originStart || targetEnd <= originStart) {
        return clampValue(x, padding, targetEnd);
      }
      const ratio = clampValue((x - originStart) / (originEnd - originStart), 0, 1);
      return originStart + (targetEnd - originStart) * ratio;
    }

    function isAssetPath(value) {
      return typeof value === 'string' && /^([/.]|[A-Za-z]:\\)/.test(value);
    }

    function renderAssetIcon(src, alt, fallbackName) {
      if (isAssetPath(src)) {
        return '<img src="' + src + '" alt="' + (alt || fallbackName || 'asset') + '">';
      }
      return iconMarkup(src || fallbackName);
    }

    function renderMaterialIcon(icon) {
      return renderAssetIcon(icon, 'material', 'cache');
    }

    function renderUnlockIcons(iconValue) {
      const icons = Array.isArray(iconValue) ? iconValue : (iconValue ? [iconValue] : []);
      if (!icons.length) return '';

    }

    function renderNodeIcon(node) {
      if (typeof node?.iconText === 'string' && node.iconText.trim()) {
        return '<span class="force-node-icon-text">' + node.iconText + '</span>';

      const icon = node?.iconImage || node?.icon;
      if (isAssetPath(icon)) {
        if (/\.svg(?:[?#]|$)/i.test(icon)) {
          const safeLabel = node?.title || icon || 'asset';
          return '<span class="is-svg" role="img" aria-label="' + safeLabel + '" style="-webkit-mask-image:url(' + icon + ');mask-image:url(' + icon + ');"></span>';
        }
        return '<img src="' + icon + '" alt="' + (node?.title || icon || 'asset') + '">';
      }
      return renderAssetIcon(icon, node?.title, icon);
    }

    function getNodeStyleVars(faction, node) {
      const colors = {
        ...(faction?.nodeTheme || {}),
        ...(node?.colors || {})
      };
      const accent = colors.accent || faction?.themecolor;
      const styleMap = {
        '--node-accent': accent,
        '--node-bg': colors.background,
        '--node-border': colors.border,
        '--node-frame-color': colors.frameBorder || colors.border,
        '--node-text': colors.text,
        '--node-icon': colors.icon || faction?.themecolor,

        '--node-bar-active-bg': colors.barActiveBg || accent,
        '--node-bar-active-border': colors.barActiveBorder || '#000'

        .filter(([, value]) => typeof value === 'string' && value.trim())
        .map(([key, value]) => key + ':' + value)

    function getNodeInlineStyle(faction, node) {
      const layout = 'left:' + node.x + 'px;top:' + node.y + 'px;width:' + node.width + 'px;height:' + node.height + 'px;';
      const colorVars = getNodeStyleVars(faction, node);
      const minSide = Math.max(1, Math.min(node.width || 0, node.height || 0));
      const levelCount = getNodeLevelCount(node);
      const nodeRadius = clampValue(minSide * 0.14, 12, 20);
      const nodeBorderWidth = clampValue(minSide * 0.0085, 1, 2);
      const frameBorderWidth = clampValue(minSide * 0.008, 1, 1.6);
      const frameStep = clampValue(minSide * 0.022, 3, 5);
      const frameReserve = 0;
      const contentMinSide = Math.max(1, minSide - (frameReserve * 2));
      const contentWidth = Math.max(1, (node.width || 0) - (frameReserve * 2));
      const iconSize = clampValue(minSide * 0.4, 20, 50);
      const iconFontSize = clampValue(minSide * 0.2, 20, 42);
      const barWidth = clampValue(contentWidth * 0.14, 11, 22);
      const barHeight = clampValue(minSide * 0.038, 4, 8);
      const badgeFontSize = clampValue(contentMinSide * 0.068, 10, 13);
      const badgeHeight = clampValue(contentMinSide * 0.13, 18, 24);
      const badgeMinWidth = clampValue(contentMinSide * 0.14, 18, 26);
      const badgePad = clampValue(contentMinSide * 0.028, 4, 7);
      const edgeInset = clampValue(contentMinSide * 0.08, 8, 14);
      const gap = clampValue(contentMinSide * 0.12, 10, 20);
      const padding = clampValue(contentMinSide * 0.08, 8, 14);
      const barsBottom = clampValue(contentMinSide * 0.08, 8, 14);
      const barGap = clampValue(minSide * 0.03, 3, 6);
      const styleVars = [
        '--node-radius:' + nodeRadius + 'px',
        '--node-border-width:' + nodeBorderWidth + 'px',
        '--node-frame-border-width:' + frameBorderWidth + 'px',
        '--node-frame-step:' + frameStep + 'px',
        '--node-icon-size:' + iconSize + 'px',
        '--node-icon-font-size:' + iconFontSize + 'px',
        '--node-bar-width:' + barWidth + 'px',
        '--node-bar-height:' + barHeight + 'px',
        '--node-badge-font-size:' + badgeFontSize + 'px',
        '--node-badge-height:' + badgeHeight + 'px',
        '--node-badge-min-width:' + badgeMinWidth + 'px',
        '--node-badge-padding-x:' + badgePad + 'px',
        '--node-badge-left:' + edgeInset + 'px',
        '--node-badge-top:' + edgeInset + 'px',
        '--node-gap:' + gap + 'px',
        '--node-padding:' + padding + 'px',
        '--node-bars-bottom:' + barsBottom + 'px',
        '--node-bar-gap:' + barGap + 'px'
      ].join(';');
      const fullStyle = layout + styleVars + ';' + (colorVars ? colorVars + ';' : '');
      return fullStyle;
    }

    function renderFactionButtonVisual(faction) {
      const icon = faction?.switchIcon || faction?.iconImage || faction?.icon;

    function renderFactionButton(faction, isActive) {

      const raw = await fetchJson(catalogItem.dataPath || ('/factions/factions/' + factionId + '.json'));

        '<div class="force-detail-copy">',
        '<p class="force-detail-kicker">' + (isPeakDetail ? ('巅峰节点 | ' + (peakNode?.id || ('peak_' + (state.peakIndex + 1)))) : (node?.kicker || faction.title)) + '</p>',
        '<h2>' + detailTitle + '</h2>',
        '<p class="force-detail-meta">' + detailMeta + '</p>',
        '<div class="force-level-switch">' + (isPeakDetail
          ? peakButtons.map((_, index) => {
              const level = index + 1;
              return '<button class="force-level-pill' + (index === state.peakIndex ? ' active' : '') + '" type="button" data-peak-index="' + index + '">' + level + '</button>';
            }).join('')
          : (node?.levels || []).map((_, index) => {
          const level = index + 1;
          return '<button class="force-level-pill' + (level === state.level ? ' active' : '') + '" type="button" data-level="' + level + '">' + level + '</button>';
        }).join('')) + '</div>',
        detailSummary ? '<p class="force-detail-description">' + detailSummary + '</p>' : '',
        '<div class="force-detail-block"><h3><span class="force-detail-unlock-name">' + detailUnlockName + '</span>' + renderUnlockIcons(unlockIcons) + '</h3><div class="force-stat-list">' + (detailUnlockNums ? '<div class="force-stat-row highlight"><span></span><strong>' + detailUnlockNums + '</strong></div>' : '') + (isPeakDetail && peakNode?.unlockConditions ? '<div class="force-stat-row"><span>解锁条件</span><strong>' + peakNode.unlockConditions + '</strong></div>' : '') + '</div></div>',
        '<div class="force-detail-block"><h3>材料</h3><div class="force-stat-list">' + materials.map(item => '<div class="force-material-row"><span class="force-material-visual">' + renderMaterialIcon(item.materialIcon) + '</span><span class="force-material-name">' + (item.materialName || item.label || '') + '</span><strong>' + (item.materialNums || item.value || '') + '</strong></div>').join('') + '</div></div>',
        '</div>',
        '<div class="force-detail-footer">' + resources.map(item => '<div class="force-resource-row"><span>' + item.label + '</span><strong>' + item.value + '</strong></div>').join('') + '</div>',
        '</aside>',
        '</div>',
        '</section>',
        '</div>'
      ].join('');

      app.querySelectorAll('[data-faction-id]').forEach(button => {
        button.addEventListener('click', async () => {
          state.nodeId = null;
          state.level = null;
          await activateFaction(button.dataset.factionId);
        });
      });

      app.querySelectorAll('[data-peak-index]').forEach(button => {
        button.addEventListener('click', () => {
          state.detailMode = 'peak';
          state.peakIndex = Number.parseInt(button.dataset.peakIndex, 10) || 0;
          render();
        });
      });

      app.querySelectorAll('[data-node-id]').forEach(button => {
        button.addEventListener('click', () => {
          state.detailMode = 'node';
          state.nodeId = button.dataset.nodeId;
          state.level = null;
          render();
        });
      });

      app.querySelectorAll('[data-level]').forEach(button => {
        button.addEventListener('click', () => {
          state.level = Number.parseInt(button.dataset.level, 10) || 1;
          render();
        });
      });

      const detailBlocks = Array.from(app.querySelectorAll('.force-detail-panel .force-detail-block'));
      if (detailBlocks.length) {
        const unlockBlock = detailBlocks[0] || null;
        const materialsBlock = detailBlocks[1] || null;

        if (unlockBlock) {
          const unlockName = unlockBlock.querySelector('.force-detail-unlock-name');
          if (unlockName && !unlockName.textContent.trim()) {
            unlockName.remove();
          }
        }

        if (isPeakDetail && materialsBlock && !materials.length) {
          materialsBlock.remove();
        }
      }

      requestAnimationFrame(applyMapFit);
    }

    function applyMapFit() {
      const fit = app.querySelector('.force-map-fit');
      const scroller = app.querySelector('.force-map-scroller');
      const scaleWrap = app.querySelector('[data-map-scale]');
      const canvas = app.querySelector('[data-map-canvas]');
      if (!fit || !scroller || !scaleWrap || !canvas) return;

      const baseCanvasWidth = Number.parseFloat(canvas.dataset.baseWidth) || canvas.offsetWidth;
      const baseCanvasHeight = Number.parseFloat(canvas.dataset.baseHeight) || canvas.offsetHeight;
      if (!baseCanvasWidth || !baseCanvasHeight) return;

      const widthScale = fit.clientWidth / baseCanvasWidth;
      const heightScale = fit.clientHeight / baseCanvasHeight;
      const isNarrow = window.innerWidth <= 1280;
      const scale = isNarrow
        ? Math.min(widthScale, heightScale) * 0.98
        : Math.min(widthScale, heightScale) * 0.995;

      canvas.style.setProperty('--canvas-width', baseCanvasWidth + 'px');
      canvas.style.setProperty('--canvas-height', baseCanvasHeight + 'px');
      canvas.style.marginLeft = '0px';
      scaleWrap.style.width = (baseCanvasWidth * scale) + 'px';
      scaleWrap.style.height = (baseCanvasHeight * scale) + 'px';
      canvas.style.transform = 'scale(' + scale + ')';

      scroller.style.overflow = isNarrow ? 'auto' : 'hidden';
      fit.style.overflow = isNarrow ? 'auto' : 'hidden';
      fit.style.justifyContent = 'center';
    }

    async function bootstrap() {
      state.data = normalizeFactionCatalogData(await fetchJson('/factions/data.json'));
      const initialFactionId = state.factionId || getDefaultFactionId();
      await activateFaction(initialFactionId, { render: false });
      render();
    }

    bootstrap().catch(error => {
      console.error(error);
      app.innerHTML = '<div class="empty-state"><h1>加载失败</h1><p>阵营页面数据未能正确读取。</p></div>';
    });
    window.addEventListener('resize', () => {
      requestAnimationFrame(applyMapFit);
    });

    function goBack() {
      if (window.history.length > 1 && document.referrer) {
        window.history.back();
        return;
      }
      window.location.href = '/marathon-lore/';
    }

    document.addEventListener('click', event => {
      const trigger = event.target.closest('[data-factions-esc-back]');
      if (!trigger) return;
      event.preventDefault();
      goBack();
    });

    window.addEventListener('keydown', event => {
      if (event.key !== 'Escape') return;
      const active = document.activeElement;
      const tagName = active && active.tagName ? active.tagName.toLowerCase() : '';
      if (tagName === 'input' || tagName === 'textarea' || active?.isContentEditable) return;
      goBack();
    });
  </script>
</body>
</html>
